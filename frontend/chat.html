<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillX - Live Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" style="text-decoration: none;"><h1 id="logo">Skill<span>X</span></h1></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="skills.html">Explore</a></li>
                <li><a href="chat.html" class="active">Chat</a></li>
                <li><button class="btn btn-outline" id="loginBtn">Login</button></li>
                <li><button class="btn btn-primary" id="registerBtn">Get Started</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="chat-container">
        
        <div id="username-page">
            <div class="username-page-container">
                <h2>Join the Skill Exchange Room</h2>
                <form id="usernameForm" name="usernameForm">
                    <div class="form-group">
                        <input type="text" id="name" placeholder="Enter your username (e.g., Learner/Teacher)" autocomplete="off" class="form-control" />
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">Start Chatting</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="chat-page" class="hidden">
            <div class="chat-header">
                <h2>Skill Exchange Global Chat</h2>
                <div class="connecting">Connecting...</div>
            </div>
            
            <ul id="messageArea">
                <!-- Messages will be injected here -->
            </ul>

            <form id="messageForm" name="messageForm">
                <div class="message-input-container">
                    <div class="input-group">
                        <input type="text" id="message" placeholder="Type a message..." autocomplete="off" class="form-control" />
                        <button type="submit" class="btn btn-primary send-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </form>
        </div>

    </main>


    <div id="footer-placeholder"></div>

    <script src="config.js"></script>

    <script src="script.js"></script>
    <script src="chat.js"></script>
</body>
</html>
