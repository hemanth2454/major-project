<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillX | Teach a Skill</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" style="text-decoration: none;"><h1 id="logo">Skill<span>X</span></h1></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="skills.html">Explore</a></li>
                <li><a href="chat.html">Chat</a></li>
                <li><button class="btn btn-outline" id="loginBtn">Login</button></li>
                <li><button class="btn btn-primary" id="registerBtn">Get Started</button></li>
            </ul>
        </div>
    </nav>

    <section class="section" style="padding-top: 10rem;">
        <div class="container">
            <h2 class="section-title">Share Your Knowledge</h2>
            
            <div class="form-container">
                <form id="teachForm">
                    <div class="form-group">
                        <label for="courseTitle">Skill Title</label>
                        <input type="text" id="courseTitle" class="form-control" required placeholder="e.g. Introduction to Python">
                    </div>
                    
                    <div class="form-group">
                        <label for="courseCategory">Category</label>
                        <select id="courseCategory" class="form-control" required disabled>
                            <option value="tech">Technical Skills</option>
                            <option value="culture">Cultural & Languages</option>
                            <option value="cooking">Cooking & Culinary</option>
                            <option value="art">Art & Design</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="courseInstructor">Your Name</label>
                        <input type="text" id="courseInstructor" class="form-control" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="courseDesc">Description</label>
                        <textarea id="courseDesc" class="form-control" required placeholder="What will people learn from this?"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Register Skill</button>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <div id="footer-placeholder"></div>

    <script src="config.js"></script>
    <script src="notification-manager.js"></script>

    <script src="script.js"></script>
    <script src="teach.js"></script>
</body>
</html>
